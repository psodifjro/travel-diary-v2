{% extends "base.html" %}
{% block content %}

<section class="panel" style="max-width: 560px;">
  <h2 style="margin:0 0 10px;">Регистрация</h2>
  <form method="POST">
    <div style="margin-bottom:10px;">
      <div class="mag-meta">Логин</div>
      <input class="input" name="username" placeholder="придумай логин">
    </div>
    <div style="margin-bottom:14px;">
      <div class="mag-meta">Пароль</div>
      <input class="input" type="password" name="password" placeholder="придумай пароль">
    </div>
    <button class="btnx btn-primaryx btn-full" type="submit">Создать аккаунт</button>
  </form>
  <div class="mag-meta" style="margin-top:12px;">Для демонстрации можно использовать: <b>demo / demo</b> (после seed).</div>
</section>

{% endblock %}
